name: Backend unit tests

# pytest runs the backend's pure-logic unit tests. Fast (under half a second
# on a clean checkout) and pure Python — no database, no LLM calls, no
# network. Gated on PRs and pushes to main so backend regressions can't
# land silently.

on:
  pull_request:
    paths:
      - 'backend/**'
      - '.github/workflows/unit-tests.yml'
  push:
    branches: [main]
    paths:
      - 'backend/**'
      - '.github/workflows/unit-tests.yml'

jobs:
  unit-tests:
    name: Backend unit tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements.txt

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r backend/requirements.txt
          pip install pytest

      - name: Run unit tests
        working-directory: backend
        run: python -m pytest -v
