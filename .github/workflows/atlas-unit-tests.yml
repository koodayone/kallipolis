name: Atlas checks

# Gates the atlas frontend on type safety, unit tests, and a
# production build. The chain runs fast → slow so the cheapest
# failures surface first: tsc catches type errors in paths the
# tests don't exercise, Vitest exercises the logic the tests do
# cover, and next build catches production-only failures that
# dev mode forgives. Path-filtered to atlas/** so unrelated
# changes don't trigger the job.
#
# Lint is not currently gated — see atlas/.eslintrc drift noted
# in the testing docs. Add the lint step after the eslint config
# is repaired.

on:
  pull_request:
    paths:
      - 'atlas/**'
      - '.github/workflows/atlas-unit-tests.yml'
  push:
    branches: [main]
    paths:
      - 'atlas/**'
      - '.github/workflows/atlas-unit-tests.yml'
  workflow_dispatch:

# Cancel stale runs when a newer commit lands on the same ref so we
# don't spend CI minutes on superseded code.
concurrency:
  group: atlas-checks-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Atlas checks
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: atlas
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: atlas/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npx tsc --noEmit

      - name: Unit tests
        run: npm test -- --reporter=verbose

      - name: Production build
        run: npm run build
